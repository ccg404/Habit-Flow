<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Flow</title>
    <link rel="stylesheet" href="output.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=add" />
</head>
<body class="flex justify-center items-start bg-slate-100">
    <div class="flex justify-start items-start min-h-screen min-w-3xl max-w-2/3 flex-col">
        <!--Header-->
        <header class="border-b-2 border-b-slate-400 min-w-full max-w-2/4 pt-5 flex flex-row items-center justify-between">
            <div class="">
                <h1 class="text-4xl font-bold mb-2">Habit Flow</h1>
                <p class="text-lg uppercase">Your Daily Progress</p>
            </div>
            <div>
                <span id="habit-progress" class="text-4xl font-bold">0%</span>
            </div>
        </header>
        <!--Add Habit-->
        <section class="mt-10 w-full relative">
            <input type="text" name="habit" id="userHabit" placeholder="What are you starting today?"
                class="w-full bg-white border border-black/5 rounded-2xl px-6 py-4 pr-16 shadow-sm focus:outline-none focus:ring-2 focus:ring-emerald-500/20
                transition-all placeholder:text-neutral-300"
            >
            <button class="absolute top-2 right-2 bottom-2 aspect-square bg-emerald-500 text-white rounded-xl flex items-center justify-center 
            hover:bg-emerald-600 transition-colors shadow-lg shadow-emerald-500/20 active:scale-95">
                <span class="material-symbols-outlined">add</span>
            </button>
        </section>
        <!--filters-->
        <section class="flex flex-row items-start justify-start gap-5 w-full mt-10">
            <span class="px-4 py-1.5 rounded-full text-xs font-semibold capitalize transition-all border hover:border-black/20 cursor-default">All</span>
            <span class="px-4 py-1.5 rounded-full text-xs font-semibold capitalize transition-all border hover:border-black/20 cursor-default">Active</span>
            <span class="px-4 py-1.5 rounded-full text-xs font-semibold capitalize transition-all border hover:border-black/20 cursor-default">Completed</span>
        </section>
    </div>
</body>
</html>
